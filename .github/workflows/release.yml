name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v3.3.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build aiope-remote installer
        run: |
          cd daemon
          go mod tidy
          bash scripts/build-installer.sh ${GITHUB_REF_NAME:-dev}
          mkdir -p ../feature-remote/src/main/assets
          cp dist/aiope-remote-installer.sh ../feature-remote/src/main/assets/

      - name: Create secrets.properties
        run: echo "GATEWAY_KEY=${{ secrets.GATEWAY_KEY }}" > secrets.properties

      - name: Create keystore for JDK 21
        run: |
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "No signing secrets configured — using debug keystore"
            keytool -genkey -v -keystore xnet.keystore \
              -alias release \
              -storepass android \
              -keypass android \
              -keyalg RSA -keysize 2048 \
              -storetype PKCS12 \
              -dname "CN=CI Build, OU=AIOPE, O=XNet, L=Unknown, ST=Unknown, C=XX"
            echo "storeFile=xnet.keystore"  > keystore.properties
            echo "storePassword=android"   >> keystore.properties
            echo "keyAlias=release"        >> keystore.properties
            echo "keyPassword=android"     >> keystore.properties
          else
            keytool -genkey -v -keystore xnet.keystore \
              -alias "${{ secrets.KEY_ALIAS }}" \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              -keyalg RSA -keysize 2048 \
              -storetype PKCS12 \
              -dname "CN=CI Build, OU=AIOPE, O=XNet, L=Unknown, ST=Unknown, C=XX"
            echo "storeFile=xnet.keystore"          > keystore.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"              >> keystore.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"        >> keystore.properties
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:assembleRelease -x spotlessCheck -x spotlessKotlinCheck

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "AIOPE-${VERSION}-release.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: AIOPE-*-release.apk

      - name: Create Release (if version provided)
        if: github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: AIOPE-*-release.apk
          generate_release_notes: true
